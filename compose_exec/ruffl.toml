# The minimum Python version to support
target-version = "py310"

# Set the maximum line length (88 is the Black/Ruff default)
line-length = 88

[lint]
# 1. Enable specific rule sets
# E/W = pycodestyle, F = Pyflakes, I = isort, B = flake8-bugbear
select = ["E", "F", "I", "B"]

# 2. Skip specific rules if they are too annoying
# Example: ignore "line too long" (E501)
ignore = ["E501"]

# 3. Allow unused imports in __init__.py files
[lint.per-file-ignores]
"__init__.py" = ["F401"]

[format]
# Use double quotes for strings (like Black)
quote-style = "double"

